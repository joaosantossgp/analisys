name: Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.2.0 — without the v prefix)"
        required: true

jobs:
  build-windows:
    name: Build & publish Windows bundle
    runs-on: windows-latest
    permissions:
      contents: write  # needed to create GitHub Releases

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm ci --prefix apps/web

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $raw = "${{ github.event.inputs.version }}"
          if (-not $raw) {
            $raw = "${{ github.ref_name }}" -replace '^v', ''
          }
          echo "VERSION=$raw" >> $env:GITHUB_OUTPUT
          echo "TAG=v$raw" >> $env:GITHUB_OUTPUT

      - name: Build desktop bundle
        shell: pwsh
        run: |
          .\desktop\build_desktop.ps1 -Version "${{ steps.ver.outputs.VERSION }}"

      - name: Package release artifact
        id: pkg
        shell: pwsh
        run: |
          $ver  = "${{ steps.ver.outputs.VERSION }}"
          $zip  = "CVMAnalytics-windows-v$ver.zip"
          Compress-Archive -Path dist\CVMAnalytics -DestinationPath $zip
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          "$hash  $zip" | Out-File -FilePath "$zip.sha256" -Encoding utf8 -NoNewline
          echo "ZIP=$zip" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.TAG }}
          name: "CVM Analytics ${{ steps.ver.outputs.TAG }}"
          generate_release_notes: true
          files: |
            ${{ steps.pkg.outputs.ZIP }}
            ${{ steps.pkg.outputs.ZIP }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
