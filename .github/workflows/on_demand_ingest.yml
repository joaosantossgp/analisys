name: On-Demand CVM Ingest

on:
  workflow_dispatch:
    inputs:
      cd_cvm:
        description: "Codigo CVM para refresh sob demanda"
        required: true
        type: string
      start_year:
        description: "Ano inicial (default: 2010)"
        required: false
        default: "2010"
        type: string
      end_year:
        description: "Ano final (default: ano corrente)"
        required: false
        default: ""
        type: string

jobs:
  ingest:
    name: Ingest on-demand CVM company
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Check DATABASE_URL
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL secret is not set. Aborting ingestion to avoid writing to an unintended database."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Resolve end year
        id: years
        run: |
          END_YEAR="${{ github.event.inputs.end_year }}"
          if [ -z "$END_YEAR" ]; then
            END_YEAR=$(date +%Y)
          fi
          echo "end_year=$END_YEAR" >> "$GITHUB_OUTPUT"

      - name: Run on-demand ingestion
        run: |
          python scripts/batch_completo.py \
            --cd-cvms "${{ github.event.inputs.cd_cvm }}" \
            --start-year "${{ github.event.inputs.start_year || '2010' }}" \
            --end-year "${{ steps.years.outputs.end_year }}" \
            --skip-yfinance

      - name: Smoke check - verify refresh status
        run: |
          RESPONSE=$(curl -sf "https://analisys-production.up.railway.app/refresh-status?cd_cvm=${{ github.event.inputs.cd_cvm }}")
          echo "$RESPONSE"
          STATUS=$(printf '%s' "$RESPONSE" | python -c "import json,sys; payload=json.load(sys.stdin); print(str((payload[0].get('last_status') if payload else '') or '').lower())")
          if [ "$STATUS" != "success" ]; then
            echo "::error::Expected last_status=success for cd_cvm=${{ github.event.inputs.cd_cvm }}, got '$STATUS'."
            exit 1
          else
            echo "::notice::refresh-status returned success for cd_cvm=${{ github.event.inputs.cd_cvm }}."
          fi
